name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-scan-deploy:

    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # CHECKOUT
      # ==========================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================================
      # NODE SETUP
      # ==========================================
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ==========================================
      # INSTALL DEPENDENCIES
      # ==========================================
      - name: Install Dependencies
        run: npm install

      # ==========================================
      # NPM AUDIT
      # ==========================================
      - name: Security Audit
        run: npm audit --audit-level=high

      # ==========================================
      # TRIVY SCAN
      # ==========================================
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: table

      # ==========================================
      # DOCKER LOGIN
      # ==========================================
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ==========================================
      # BUILD IMAGE
      # ==========================================
      - name: Build Docker Image
        run: |
          docker build -t tomidedev/zurimarket-backend:v1 .

      # ==========================================
      # PUSH IMAGE
      # ==========================================
      - name: Push Docker Image
        run: |
          docker push tomidedev/zurimarket-backend:v1

      # ==========================================
      # AWS CREDENTIALS
      # ==========================================
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ==========================================
      # RETRIEVE SECRET
      # ==========================================
      - name: Get Secrets Manager Secret
        id: secret
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
          --secret-id zurimarket-prod \
          --query SecretString \
          --output text)

          echo "$SECRET" > secret.json

      # ==========================================
      # CONFIGURE KUBECONFIG
      # ==========================================
      - name: Configure Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" > ~/.kube/config

      # ==========================================
      # CREATE NAMESPACE
      # ==========================================    
      - name: Create Namespace
        run: |
          kubectl apply -f k8s/namespace.yaml    

      # ==========================================
      # CREATE KUBERNETES SECRET
      # ==========================================
      - name: Create Backend Secret
        run: |
          API_SECRET_KEY=$(jq -r '.API_SECRET_KEY' secret.json)
          STORE_NAME=$(jq -r '.STORE_NAME' secret.json)

          kubectl create secret generic backend-secret \
            --namespace=zurimarket \
            --from-literal=API_SECRET_KEY="$API_SECRET_KEY" \
            --from-literal=STORE_NAME="$STORE_NAME" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ==========================================
      # DEPLOY BACKEND
      # ==========================================
      - name: Deploy Backend
        run: |
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml